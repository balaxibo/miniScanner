<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>ALY GYM - MINI QR SCANNER</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020617">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { background: #020617; font-family: 'Inter', sans-serif; }

#reader { width: 100%; height: 100%; position: relative; }
#reader video {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover;
}

.scan-frame {
  position: absolute;
  width: 55%;
  height: 55%;
  border: 3px solid #22c55e;
  border-radius: 16px;
  box-shadow: 0 0 20px rgba(34,197,94,0.4);
}

.corner {
  position: absolute;
  width: 20px;
  height: 20px;
  border: 3px solid #22c55e;
}

.corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
.corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
.corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
.corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

.overlay {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(15,23,42,0.1), rgba(15,23,42,0.9));
  display: flex;
  align-items: center;
  justify-content: center;
}

.status-bar {
  background: #020617;
  border-top: 1px solid #1e293b;
}

.ok { color: #22c55e; }
.err { color: #ef4444; }
.processing { color: #3b82f6; }
.today { color: #eab308; }
</style>
</head>

<body class="flex flex-col h-screen">

<div class="relative flex-1">
  <div id="reader"></div>

  <div class="overlay">
    <div class="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
  </div>
</div>

<div class="status-bar p-3 space-y-3">

  <!-- STATUS -->
  <div id="statusMsg" class="text-center font-extrabold text-2xl ok">
    Sẵn sàng
  </div>

  <!-- RESULT -->
  <div id="lastScan" class="text-sm text-gray-300 text-center min-h-[20px]">
    Chưa có dữ liệu
  </div>

  <!-- BUTTONS -->
  <div class="grid grid-cols-3 gap-2">

    <button id="scanToggleBtn"
      class="bg-emerald-600 text-white py-3 rounded-lg font-bold text-sm">
      BẬT CAMERA
    </button>

    <button id="aptModeBtn"
      class="bg-gray-900 text-emerald-300 py-3 rounded-lg border border-emerald-500/40 text-sm font-bold">
      PT
    </button>

    <button id="backBtn"
      class="bg-gray-900 text-gray-300 py-3 rounded-lg border border-gray-600 text-sm font-bold">
      THOÁT
    </button>

  </div>
</div>

<script>
let html5QrCode;
let isProcessing = false;
let lastQR = "";
let lastTime = 0;
let API_BASE = null;
let aptMode = "PT";
let fullReturnUrl = null;
let isScanning = false;

window.addEventListener("load", init);

async function init() {
  const params = new URLSearchParams(location.search);
  const ret = params.get("return");
  fullReturnUrl = ret ? decodeURIComponent(ret) : null;
  API_BASE = fullReturnUrl ? fullReturnUrl.split("?")[0] : null;

  if (!API_BASE) {
    setStatus("Thiếu return URL", "err");
    return;
  }

  try {
    html5QrCode = new Html5Qrcode("reader");
    setScanButtonState();
    setStatus("Nhấn BẬT CAMERA", "processing");
  } catch (err) {
    setStatus("Lỗi camera", "err");
  }
}

async function startScanner() {
  try {
    await html5QrCode.start(
      { facingMode: "environment" }, // 🔥 luôn camera sau
      {
        fps: 10,
        qrbox: { width: 180, height: 180 },
        formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ]
      },
      onScan
    );

    isScanning = true;
    setScanButtonState();
    setStatus("Đang quét...", "ok");

  } catch (err) {
    setStatus("Không mở được camera", "err");
  }
}

async function stopScanner(auto = false) {
  if (!html5QrCode || !isScanning) return;

  try { await html5QrCode.stop(); } catch (e) {}

  isScanning = false;
  setScanButtonState();

  if (!auto) setStatus("Đã tắt camera", "processing");
}

document.getElementById("scanToggleBtn").onclick = async () => {
  if (isScanning) await stopScanner(false);
  else await startScanner();
};

document.getElementById("aptModeBtn").onclick = function () {
  aptMode = aptMode === "PT" ? "OutOfHours" : "PT";
  this.textContent = aptMode === "PT" ? "PT" : "NGOÀI GIỜ";
};

document.getElementById("backBtn").onclick = function () {
  if (fullReturnUrl) window.location.href = fullReturnUrl;
};

function onScan(text) {
  const now = Date.now();
  const code = String(text || "").trim().toUpperCase();

  if (isProcessing || (code === lastQR && now - lastTime < 1500)) return;

  if (!/^(AG|APT)\d+$/i.test(code)) {
    setStatus("QR không hợp lệ", "err");
    return;
  }

  lastQR = code;
  lastTime = now;
  isProcessing = true;

  beep();
  setStatus("Đang xử lý...", "processing");
  document.getElementById("lastScan").innerText = code;

  let trainingType = /^APT/i.test(code) ? aptMode : "NonPT";

  callApi(code, trainingType);
}

function callApi(code, trainingType) {
  const cbName = "cb_" + Date.now();

  window[cbName] = function (res) {
    delete window[cbName];
    handleResult(code, res);
    isProcessing = false;
  };

  const url = API_BASE +
    "?mode=api&code=" + code +
    "&trainingType=" + trainingType +
    "&callback=" + cbName;

  const s = document.createElement("script");
  s.src = url;
  document.body.appendChild(s);
}

function handleResult(code, res) {
  if (!res) return setStatus("Lỗi dữ liệu", "err");

  if (res.status === "success") {
    setStatus("✅ " + res.fullName, "ok");
    flash("#022c22");
  } else {
    setStatus(res.message || "Lỗi", "err");
    flash("#450a0a");
  }

  document.getElementById("lastScan").innerText =
    `Mã: ${code} | ${res.fullName || ""}`;

  stopScanner(true); // 🔥 tự tắt sau scan
}

function setScanButtonState() {
  const btn = document.getElementById("scanToggleBtn");

  if (isScanning) {
    btn.innerText = "TẮT CAMERA";
    btn.classList.replace("bg-emerald-600", "bg-red-600");
  } else {
    btn.innerText = "BẬT CAMERA";
    btn.classList.replace("bg-red-600", "bg-emerald-600");
  }
}

function setStatus(msg, type) {
  const el = document.getElementById("statusMsg");
  el.innerText = msg;
  el.className = "text-center font-extrabold text-2xl " + type;
}

function flash(color) {
  document.body.style.background = color;
  setTimeout(() => document.body.style.background = "#020617", 250);
}

function beep() {
  try { new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play(); } catch(e){}
  if (navigator.vibrate) navigator.vibrate(80);
}
</script>

</body>
</html>
