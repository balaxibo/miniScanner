<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ALY GYM - MINI QR SCANNER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
body {
  background: #020617;
  font-family: 'Inter', sans-serif;
}

#reader {
  width: 100%;
  height: 100%;
  position: relative;
}

#reader video {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover;
}

/* KHUNG QUÉT POS */
.scan-frame {
  position: absolute;
  width: 70%;
  height: 70%;
  border: 3px solid #22c55e;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(34,197,94,0.6);
}

/* 4 góc kiểu POS */
.corner {
  position: absolute;
  width: 25px;
  height: 25px;
  border: 4px solid #22c55e;
}

.corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
.corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
.corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
.corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

/* scan line */
.scan-line {
  position: absolute;
  width: 100%;
  height: 2px;
  background: #22c55e;
  box-shadow: 0 0 10px #22c55e;
  animation: scan 1.8s linear infinite;
}

@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

/* overlay tối xung quanh */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* status bar */
.status-bar {
  background: #020617;
  border-top: 1px solid #1e293b;
}

/* trạng thái */
.ok { color: #22c55e; }
.err { color: #ef4444; }
.processing { color: #3b82f6; }
</style>
</head>
<body class="flex flex-col h-screen">

<!-- CAMERA -->
<div class="relative flex-1">
  <div id="reader"></div>

  <div class="overlay">
    <div class="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scan-line"></div>
    </div>
  </div>
</div>

<!-- STATUS POS -->
<div class="status-bar p-4">

  <div class="flex justify-between items-center">
    <div>
      <div class="text-xs text-gray-400">TRẠNG THÁI</div>
      <div id="statusMsg" class="font-bold text-lg ok">
        Sẵn sàng quét
      </div>
    </div>

    <select id="cameraSelect" class="bg-gray-800 text-white text-sm p-2 rounded"></select>
  </div>

  <div id="lastScan" class="text-sm text-gray-400 mt-2">
    Chưa có dữ liệu
  </div>

</div>

    <script>
let html5QrCode;
let isProcessing = false;
let lastQR = "";
let lastTime = 0;
let RETURN_URL = null;

window.onload = () => {
  const params = new URLSearchParams(location.search);
  RETURN_URL = params.get("return");

  init();
};

async function init() {
  html5QrCode = new Html5Qrcode("reader");

  const devices = await Html5Qrcode.getCameras();

  const select = document.getElementById("cameraSelect");
  select.innerHTML = devices.map(d =>
    `<option value="${d.id}">${d.label}</option>`
  ).join("");

  const back = devices.find(d =>
    d.label.toLowerCase().includes("back")
  );

  start(back ? back.id : devices[0].id);
}

async function start(id) {
  await html5QrCode.start(
    id,
    { fps: 10, qrbox: 250 },
    onScan
  );

  setStatus("Sẵn sàng quét", "ok");
}

function onScan(text) {
  const now = Date.now();

  if (
    isProcessing ||
    (text === lastQR && now - lastTime < 2000)
  ) return;

  lastQR = text;
  lastTime = now;
  isProcessing = true;

  beep();
  setStatus("Đang xử lý...", "processing");

  document.getElementById("lastScan").innerText = text;

  if (!RETURN_URL) {
    setStatus("Thiếu return URL", "err");
    isProcessing = false;
    return;
  }

  const url = RETURN_URL + (RETURN_URL.includes("?") ? "&" : "?") + "qr=" + text;

  setTimeout(() => {
    window.location.href = url;
  }, 500);
}

function setStatus(msg, type) {
  const el = document.getElementById("statusMsg");
  el.innerText = msg;
  el.className = "font-bold text-lg " + type;
}

function beep() {
  new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play();
  if (navigator.vibrate) navigator.vibrate(100);
}

document.getElementById("cameraSelect")?.addEventListener("change", async (e) => {
  await html5QrCode.stop();
  start(e.target.value);
});
</script>
</body>
</html>
