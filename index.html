<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>ALY GYM - MINI QR SCANNER</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { background: #020617; font-family: 'Inter', sans-serif; }

#reader { width: 100%; height: 100%; position: relative; }
#reader video {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover;
}

.scan-frame {
  position: absolute;
  width: 70%;
  height: 70%;
  border: 3px solid #22c55e;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(34,197,94,0.6);
}

.corner {
  position: absolute;
  width: 25px;
  height: 25px;
  border: 4px solid #22c55e;
}

.corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
.corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
.corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
.corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

.scan-line {
  position: absolute;
  width: 100%;
  height: 2px;
  background: #22c55e;
  animation: scan 1.8s linear infinite;
}

@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
}

.status-bar {
  background: #020617;
  border-top: 1px solid #1e293b;
}

.ok { color: #22c55e; }
.err { color: #ef4444; }
.processing { color: #3b82f6; }
</style>
</head>

<body class="flex flex-col h-screen">

<div class="relative flex-1">
  <div id="reader"></div>

  <div class="overlay">
    <div class="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scan-line"></div>
    </div>
  </div>
</div>

<div class="status-bar p-4">
  <div class="flex justify-between items-center">
    <div>
      <div class="text-xs text-gray-400">TRẠNG THÁI</div>
      <div id="statusMsg" class="font-bold text-lg ok">Đang khởi động...</div>
    </div>

    <select id="cameraSelect" class="bg-gray-800 text-white text-sm p-2 rounded"></select>
  </div>

  <div id="lastScan" class="text-sm text-gray-400 mt-2">
    Chưa có dữ liệu
  </div>
</div>

<script>
let html5QrCode;
let isProcessing = false;
let lastQR = "";
let lastTime = 0;

// 🔥 API GAS (THAY LINK CỦA BẠN)
const API_URL = "https://script.google.com/macros/s/AKfycbyCHuK3vgm301o_atx3nkPXiEyKU6Bru8zSAV515m97AZrZptDqtQmtEEydUE3jQ-qb/exec";

window.onload = async () => {
  await init();
};

// ===== INIT =====
async function init() {
  try {
    html5QrCode = new Html5Qrcode("reader");

    await html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 25, // ⚡ tăng tốc
        qrbox: { width: 200, height: 200 },
        formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ] // 🔥 chỉ QR → nhanh hơn
      },
      onScan
    );

    setStatus("Sẵn sàng quét", "ok");

  } catch (err) {
    setStatus("Lỗi camera: " + err.message, "err");
  }
}

// ===== SCAN =====
function onScan(text) {
  const now = Date.now();

  if (isProcessing || (text === lastQR && now - lastTime < 700)) return;

  lastQR = text;
  lastTime = now;
  isProcessing = true;

  // ⚡ tắt animation → tăng FPS thực
  document.querySelector(".scan-line").style.display = "none";

  beep();
  setStatus("Đang kiểm tra...", "processing");

  document.getElementById("lastScan").innerText = text;

  sendToServer(text);
}

// ===== CALL GAS =====
function sendToServer(qr) {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ qr })
  })
    .then(res => res.json())
    .then(showResult)
    .catch(() => {
      setStatus("Lỗi mạng", "err");
      resetScan();
    });
}

// ===== UI RESULT =====
function showResult(data) {
  const box = document.getElementById("lastScan");

  if (data.status === "success") {
    setStatus("✔ Check-in thành công", "ok");

    box.innerHTML = `
      👤 ${data.name}<br>
      🎫 ${data.package}<br>
      ⏳ ${data.expire}
    `;

    successSound();

  } else {
    setStatus("❌ " + data.message, "err");

    box.innerHTML = `
      ⚠️ ${data.message}<br>
      🔎 ${data.qr || ""}
    `;

    errorSound();
  }

  setTimeout(resetScan, 1200);
}

// ===== RESET =====
function resetScan() {
  isProcessing = false;
  setStatus("Sẵn sàng quét", "ok");
  document.querySelector(".scan-line").style.display = "block";
}

// ===== UI =====
function setStatus(msg, type) {
  const el = document.getElementById("statusMsg");
  el.innerText = msg;
  el.className = "font-bold text-lg " + type;
}

// ===== SOUND =====
function beep() {
  if (navigator.vibrate) navigator.vibrate(50);
}

function successSound() {
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
}

function errorSound() {
  new Audio("https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg").play();
}
</script>

</body>
</html>
