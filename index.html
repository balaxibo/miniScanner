<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ALY GYM - MINI QR SCANNER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        #reader { width: 100% !important; border-radius: 2rem; overflow: hidden; background: black; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scan-line { position: absolute; height: 3px; width: 100%; background: #22c55e; box-shadow: 0 0 20px #22c55e; animation: scan 2s ease-in-out infinite; z-index: 10; }
        @keyframes scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 max-w-lg mx-auto">

    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center shadow-lg shadow-green-500/20">
                <i class="fas fa-dumbbell text-white"></i>
            </div>
            <div>
                <h1 class="font-extrabold text-xl tracking-tight">ALY GYM</h1>
                <p class="text-[10px] text-green-400 font-bold uppercase tracking-widest">Standalone Mode</p>
            </div>
        </div>
        <button onclick="location.reload()" class="glass p-3 rounded-xl"><i class="fas fa-sync-alt text-gray-400"></i></button>
    </header>

    <main id="scannerSection" class="flex-1 flex flex-col gap-6">
        <div class="relative glass rounded-[2.5rem] p-2 shadow-2xl aspect-square overflow-hidden border-2 border-gray-800">
            <div id="reader"></div>
            <div id="scannerOverlay" class="absolute inset-0 pointer-events-none z-20">
                <div class="absolute inset-0 bg-black/20"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3/4 h-3/4 border-2 border-white/30 rounded-3xl">
                    <div class="scan-line"></div>
                </div>
            </div>
        </div>

        <div id="statusCard" class="glass p-5 rounded-2xl flex items-center gap-4 border-l-4 border-green-500">
            <div class="w-12 h-12 rounded-xl bg-green-500/10 flex items-center justify-center text-xl text-green-500">
                <i class="fas fa-video"></i>
            </div>
            <div class="flex-1">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Trạng thái</p>
                <p id="statusMsg" class="font-semibold text-sm">Sẵn sàng quét mã...</p>
            </div>
            <select id="cameraSelect" onchange="switchCamera(this.value)" class="glass text-xs p-2 rounded-lg outline-none"></select>
        </div>
    </main>

    <div id="resultModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/90 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300">
        <div id="resultCard" class="w-full max-w-sm glass rounded-[3rem] p-8 transform scale-90 transition-all duration-300">
            <div id="resIcon" class="w-20 h-20 rounded-3xl mx-auto flex items-center justify-center text-3xl mb-6 shadow-2xl"></div>
            <h3 id="resTitle" class="text-2xl font-black text-center mb-2"></h3>
            <p id="resName" class="text-gray-300 font-bold text-lg text-center mb-6"></p>
            <div id="resDetails" class="space-y-3 bg-white/5 rounded-2xl p-5 mb-8"></div>
            <button onclick="closeResult()" class="w-full bg-white text-gray-900 py-4 rounded-2xl font-black text-lg active:scale-95 transition-transform">TIẾP TỤC</button>
        </div>
    </div>

    <script>
        let html5QrCode = null;
        let isProcessing = false;
        let RETURN_URL = null;

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const ret = params.get('return');
            if (ret && ret.trim() !== '') {
                RETURN_URL = ret;
            }
            initScanner();
        };

        async function initScanner() {
            try {
                const devices = await Html5Qrcode.getCameras();
                if (!devices || devices.length === 0) {
                    document.getElementById('statusMsg').innerText = 'Không tìm thấy camera.';
                    return;
                }
                const select = document.getElementById('cameraSelect');
                select.innerHTML = devices.map(d => `<option value="${d.id}">${d.label}</option>`).join('');
                html5QrCode = new Html5Qrcode("reader");
                const backCamera = devices.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('rear'));
                startScanning(backCamera ? backCamera.id : devices[0].id);
            } catch (err) {
                alert('Lỗi Camera: ' + err.message);
            }
        }

        async function startScanning(cameraId) {
            await html5QrCode.start(cameraId, { fps: 20, qrbox: 250 }, onScanSuccess);
            document.getElementById('statusMsg').innerText = 'Đưa mã QR vào khung để quét...';
        }

        async function switchCamera(id) {
            await html5QrCode.stop();
            startScanning(id);
        }

        function onScanSuccess(decodedText) {
            if (isProcessing) return;
            const code = decodedText.trim().toUpperCase();
            if (!/^(AG|APT)\d+$/i.test(code)) {
                document.getElementById('statusMsg').innerText = 'Mã không hợp lệ: ' + code;
                return;
            }
            if (!RETURN_URL) {
                showResult({ status: 'error', message: 'Thiếu tham số return trong URL. Hãy mở scanner từ hệ thống ALY GYM.' });
                return;
            }
            isProcessing = true;
            if (navigator.vibrate) navigator.vibrate(100);
            document.getElementById('statusMsg').innerText = 'Đã đọc mã: ' + code + ' - Đang chuyển về hệ thống...';

            const sep = RETURN_URL.includes('?') ? '&' : '?';
            const target = RETURN_URL + sep + 'qr=' + encodeURIComponent(code);

            const navigateBack = () => {
                try {
                    if (window.opener && !window.opener.closed) {
                        window.opener.location.href = target;
                        window.close();
                    } else {
                        window.location.href = target;
                    }
                } catch (e) {
                    window.location.href = target;
                }
            };

            html5QrCode.stop().then(navigateBack).catch(navigateBack);
        }

        function showResult(res) {
            const modal = document.getElementById('resultModal');
            const icon = document.getElementById('resIcon');
            const title = document.getElementById('resTitle');
            const name = document.getElementById('resName');
            const details = document.getElementById('resDetails');

            if (res.status === 'success') {
                icon.className = 'w-20 h-20 rounded-3xl mx-auto flex items-center justify-center text-3xl mb-6 shadow-2xl bg-green-500 text-white';
                icon.innerHTML = '<i class="fas fa-check"></i>';
                title.innerText = 'THÀNH CÔNG';
                title.className = 'text-2xl font-black text-center mb-2 text-green-500';
            } else {
                icon.className = 'w-20 h-20 rounded-3xl mx-auto flex items-center justify-center text-3xl mb-6 shadow-2xl bg-red-500 text-white';
                icon.innerHTML = '<i class="fas fa-times"></i>';
                title.innerText = 'LỖI';
                title.className = 'text-2xl font-black text-center mb-2 text-red-500';
            }

            name.innerText = res.fullName || '';
            details.innerHTML = `<p class="text-center text-sm">${res.message || ''}</p>
                                <p class="text-center text-xs text-gray-500 mt-2">Mã HV: ${res.studentId || '---'}</p>`;

            modal.classList.replace('opacity-0', 'opacity-100');
            modal.classList.replace('pointer-events-none', 'pointer-events-auto');
            document.getElementById('resultCard').classList.replace('scale-90', 'scale-100');
        }

        function closeResult() {
            const modal = document.getElementById('resultModal');
            modal.classList.replace('opacity-100', 'opacity-0');
            modal.classList.replace('pointer-events-auto', 'pointer-events-none');
            document.getElementById('resultCard').classList.replace('scale-100', 'scale-90');
            setTimeout(() => { 
                isProcessing = false; 
                document.getElementById('statusMsg').innerText = 'Sẵn sàng quét mã...';
            }, 500);
        }
    </script>
</body>
</html>
