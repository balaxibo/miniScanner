<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>ALY GYM - MINI QR SCANNER</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body { background: #020617; font-family: 'Inter', sans-serif; }

#reader { width: 100%; height: 100%; position: relative; }
#reader video {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover;
}

.scan-frame {
  position: absolute;
  width: 70%;
  height: 70%;
  border: 3px solid #22c55e;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(34,197,94,0.6);
}

.corner {
  position: absolute;
  width: 25px;
  height: 25px;
  border: 4px solid #22c55e;
}

.corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; }
.corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; }
.corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; }
.corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; }

.scan-line {
  position: absolute;
  width: 100%;
  height: 2px;
  background: #22c55e;
  animation: scan 1.8s linear infinite;
}

@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
}

.status-bar {
  background: #020617;
  border-top: 1px solid #1e293b;
}

.ok { color: #22c55e; }
.err { color: #ef4444; }
.processing { color: #3b82f6; }
</style>
</head>

<body class="flex flex-col h-screen">

<div class="relative flex-1">
  <div id="reader"></div>

  <div class="overlay">
    <div class="scan-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div class="scan-line"></div>
    </div>
  </div>
</div>

<div class="status-bar p-4">
  <div class="flex justify-between items-center">
    <div>
      <div class="text-xs text-gray-400">TRẠNG THÁI</div>
      <div id="statusMsg" class="font-bold text-lg ok">Đang khởi động...</div>
    </div>

    <select id="cameraSelect" class="bg-gray-800 text-white text-sm p-2 rounded"></select>
  </div>

  <div id="lastScan" class="text-sm text-gray-400 mt-2">
    Chưa có dữ liệu
  </div>
</div>

<script>
let html5QrCode;
let isProcessing = false;
let lastQR = "";
let lastTime = 0;
let API_BASE = null;

window.addEventListener("load", init);

async function init() {
  const params = new URLSearchParams(location.search);
  const ret = params.get("return");
  API_BASE = ret ? decodeURIComponent(ret).split("?")[0] : null;

  if (!API_BASE) {
    setStatus("Thiếu return URL", "err");
    return;
  }

  try {
    html5QrCode = new Html5Qrcode("reader");
    const devices = await Html5Qrcode.getCameras();
    const select = document.getElementById("cameraSelect");
    select.innerHTML = devices.map(d =>
      `<option value="${d.id}">${d.label || d.id}</option>`
    ).join("");

    await startScanner();
    setStatus("Sẵn sàng quét", "ok");
  } catch (err) {
    setStatus("Lỗi camera: " + err.message, "err");
  }
}

async function startScanner(cameraId) {
  try {
    const config = {
      fps: 15,
      qrbox: { width: 220, height: 220 }
    };
    if (cameraId) {
      await html5QrCode.start(cameraId, config, onScan);
    } else {
      await html5QrCode.start({ facingMode: "environment" }, config, onScan);
    }
  } catch (err) {
    const devices = await Html5QrCode.getCameras();
    if (devices && devices.length > 0) {
      await html5QrCode.start(devices[0].id, { fps: 10 }, onScan);
    } else {
      setStatus("Không tìm thấy camera", "err");
    }
  }
}

async function switchCamera(id) {
  if (!html5QrCode) return;
  try {
    await html5QrCode.stop();
  } catch (e) {}
  await startScanner(id);
}

document.getElementById("cameraSelect").addEventListener("change", function (e) {
  switchCamera(e.target.value);
});

function onScan(text) {
  const now = Date.now();
  const code = String(text || "").trim().toUpperCase();

  if (isProcessing) return;
  if (code === lastQR && now - lastTime < 1500) return;

  if (!/^(AG|APT)\d+$/i.test(code)) {
    setStatus("Mã không hợp lệ: " + code, "err");
    document.getElementById("lastScan").innerText = code;
    return;
  }

  lastQR = code;
  lastTime = now;
  isProcessing = true;

  beep();
  setStatus("Đang xử lý " + code + "...", "processing");
  document.getElementById("lastScan").innerText = code;

  if (!API_BASE) {
    setStatus("Thiếu API_BASE", "err");
    isProcessing = false;
    return;
  }

  let trainingType = "NonPT";
  if (/^APT/i.test(code)) {
    trainingType = "PT";
  }

  callApi(code, trainingType);
}

function callApi(code, trainingType) {
  const cbName = "handle_" + Date.now();
  window[cbName] = function (res) {
    try {
      handleResult(code, res);
    } finally {
      delete window[cbName];
      setTimeout(function () {
        isProcessing = false;
      }, 400);
    }
  };

  const url = API_BASE
    + "?mode=api"
    + "&code=" + encodeURIComponent(code)
    + "&trainingType=" + encodeURIComponent(trainingType)
    + "&callback=" + encodeURIComponent(cbName)
    + "&ts=" + Date.now();

  const s = document.createElement("script");
  s.src = url;
  s.onerror = function () {
    setStatus("Không kết nối được máy chủ", "err");
    isProcessing = false;
  };
  document.body.appendChild(s);
}

function handleResult(code, res) {
  if (!res || typeof res !== "object") {
    setStatus("Dữ liệu không hợp lệ", "err");
    return;
  }

  const name = res.fullName || "";
  const pkg = res.packageCode || "";
  const remain = res.remainingSessions != null ? res.remainingSessions : "";
  const endDate = res.endDate || "";
  const expired = !!res.isExpired;
  const status = res.status || "";
  const msg = res.message || "";

  let line = msg;
  if (status === "success") {
    setStatus("✅ " + name, "ok");
  } else if (status === "info") {
    setStatus("ℹ️ " + msg, "processing");
  } else {
    setStatus(msg || "Lỗi", "err");
  }

  const info = [];
  info.push("Mã: " + code);
  if (name) info.push("Tên: " + name);
  if (pkg) info.push("Gói: " + pkg);
  if (remain !== "") info.push("Buổi còn: " + remain);
  if (endDate) info.push("Hạn: " + endDate);
  info.push("Thẻ: " + (expired ? "Hết hạn" : "Còn hạn"));

  document.getElementById("lastScan").innerText = info.join(" | ");
}

function setStatus(msg, type) {
  const el = document.getElementById("statusMsg");
  el.innerText = msg;
  let cls = "font-bold text-lg ";
  if (type === "ok") cls += "ok";
  else if (type === "err") cls += "err";
  else cls += "processing";
  el.className = cls;
}

function beep() {
  try {
    new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg").play();
  } catch (e) {}
  if (navigator.vibrate) navigator.vibrate(80);
}
</script>

</body>
</html>
